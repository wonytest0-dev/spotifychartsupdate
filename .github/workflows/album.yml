name: Album Charts

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: spotifychartsupdate
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npx playwright install

      - run: npm run start:album

      - run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add *.json *.txt

          git commit -m "update album" || echo "no changes"

          git push
